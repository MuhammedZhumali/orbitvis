services:
  postgis:
    image: postgis/postgis:15-3.4
    environment:
      POSTGRES_USER: orbituser
      POSTGRES_PASSWORD: orbit_pass
      POSTGRES_DB: orbitdb
    ports: ["5432:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbituser -d orbitdb"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build: .
    ports: ["8080:8080"]
    depends_on:
      postgis:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgis:5432/orbitdb
      SPRING_DATASOURCE_USERNAME: orbituser
      SPRING_DATASOURCE_PASSWORD: orbit_pass
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/8080>' || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 30s
